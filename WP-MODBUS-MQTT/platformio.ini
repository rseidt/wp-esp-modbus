; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ESP32_dev_kit

[env:d1_mini_pro]
platform = espressif8266
board = d1_mini_pro
framework = arduino
monitor_speed = 74880
lib_deps = 
	bblanchon/ArduinoJson @ ^7.4.2
	marvinroger/AsyncMqttClient @ ^0.9.0
	tzapu/WiFiManager @ ^2.0.17
	4-20ma/ModbusMaster @ ^2.0.1
	contrem/arduino-timer @ ^3.0.1

[env:ESP32_dev_kit]
board = az-delivery-devkit-v4
platform = espressif32
framework = arduino
monitor_speed = 74880
; Panic-Backtrace beim Mitlesen automatisch in Datei:Zeile uebersetzen (nur Monitor, nicht die Firmware).
monitor_filters = esp32_exception_decoder
; ACHTUNG / Coredump-to-Flash zurueckgenommen (2026-06-23): Ein gesetztes custom_sdkconfig zwingt die
; pioarduino-Plattform, die Arduino-IDF-Libs AUS QUELLE neu zu bauen. Dieser From-Source-Build bootet auf
; diesem Chip NICHT — fruehe Guru Meditation "Cache disabled but cached memory region accessed" im
; ESP-IDF Core-Init (esp_flash_init_main -> esp_flash_read_chip_id -> read_id_core -> memset), also noch
; vor der App. ROOT CAUSE (2026-06-23 per nm/addr2line bewiesen): Das ROM liefert ein cache-sicheres
; memset @ 0x4000c44c (esp32.rom.newlib-funcs.ld), der From-Source-Build linkt aber ein FLASH-memset
; @ 0x401630b0 (gecacht) und leitet memset NICHT auf die ROM-Adresse um (der vorkompilierte Core schon).
; read_id_core liegt korrekt im IRAM, ruft aber das Flash-memset -> Trap bei abgeschalteter Cache.
; -> custom_sdkconfig bewusst ENTFERNT, zurueck auf den vorkompilierten Core (bootet zuverlaessig).
; Folge: Flash-Coredump ist damit wieder inaktiv (TO_NONE fest). Die /coredump-Endpunkte sind per
; #if CONFIG_ESP_COREDUMP_* abgesichert und kompilieren als No-op.
; SACKGASSE: CONFIG_SPI_FLASH_ROM_IMPL=y (Kandidat zum Umgehen) ist auf dem ESP32-CLASSIC NICHT
; verfuegbar (depends on ESP_ROM_HAS_SPI_FLASH -> nur C2/S3/H2/C5/C6). Flash-Coredump auf diesem Chip
; nur loesbar, wenn der From-Source-Link memset auf ROM umbiegt (offenes IDF-Linker-Config-Problem).
lib_deps =
	bblanchon/ArduinoJson @ ^7.4.2
	marvinroger/AsyncMqttClient @ ^0.9.0
	tzapu/WiFiManager @ ^2.0.17
	4-20ma/ModbusMaster @ ^2.0.1
	contrem/arduino-timer @ ^3.0.1
	; Asynchroner Webserver auf demselben AsyncTCP-Stack wie AsyncMqttClient (ESP32Async/AsyncTCP
	; 3.4.10 ist bereits transitiv installiert -> kein Doppel-AsyncTCP). Ersetzt die synchrone
	; WebServer-Klasse, deren blockierendes handleClient() im Loop-Task den Freeze ausloeste.
	esp32async/ESPAsyncWebServer @ ^3.7.0
